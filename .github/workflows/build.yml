name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN: bam-filter
  PKG_NAME: bam-filter

jobs:
  linux-static:
    name: build x86_64-linux-musl static
    runs-on: ubuntu-latest
    container:
      image: crystallang/crystal:latest-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install build dependencies
        run: |
          apk add --no-cache \
            autoconf \
            automake \
            binutils \
            bash \
            build-base \
            bzip2 \
            bzip2-dev \
            bzip2-static \
            ca-certificates \
            curl \
            file \
            git \
            libdeflate-dev \
            libdeflate-static \
            libtool \
            make \
            pkgconf \
            python3 \
            ruby \
            ruby-rake \
            xz-dev \
            xz-static \
            zlib-dev \
            zlib-static

      - name: Set version variables
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            echo "CRYSTAL_RELEASE_FLAGS=--no-debug" >> "${GITHUB_ENV}"
            echo "STRIP_RELEASE=true" >> "${GITHUB_ENV}"
          else
            VERSION="build-$(date +%Y%m%d-%H%M%S)"
            echo "CRYSTAL_RELEASE_FLAGS=" >> "${GITHUB_ENV}"
            echo "STRIP_RELEASE=false" >> "${GITHUB_ENV}"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "TARGET=x86_64-unknown-linux-musl" >> "${GITHUB_ENV}"

      - name: Set htslib version
        shell: bash
        run: |
          HTSLIB_VERSION="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/samtools/htslib/releases/latest \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["tag_name"])')"
          echo "HTSLIB_VERSION=${HTSLIB_VERSION}" >> "${GITHUB_ENV}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build static htslib
        shell: bash
        run: |
          curl -fsSL "https://github.com/samtools/htslib/releases/download/${HTSLIB_VERSION}/htslib-${HTSLIB_VERSION}.tar.bz2" -o htslib.tar.bz2
          tar xjf htslib.tar.bz2
          cd "htslib-${HTSLIB_VERSION}"
          autoheader
          autoconf
          ./configure \
            --prefix=/usr/local \
            --disable-shared \
            --enable-static \
            --disable-libcurl \
            --disable-plugins
          make -j"$(nproc)"
          make install

      - name: Install shards
        run: shards install --without-development

      - name: Build static binary
        shell: bash
        run: |
          mkdir -p bin
          STATIC_LIBS="$(pkg-config --static --libs htslib)"
          crystal build src/bam-filter.cr \
            --release \
            --static \
            ${CRYSTAL_RELEASE_FLAGS} \
            --link-flags="${STATIC_LIBS}" \
            -o "bin/${BIN}"
          chmod +x "bin/${BIN}"
          if [[ "${STRIP_RELEASE}" == true ]]; then
            strip "bin/${BIN}"
          fi

      - name: Verify binary
        shell: bash
        run: |
          file "bin/${BIN}"
          ldd "bin/${BIN}" || echo "Static binary: no dynamic dependencies"
          "bin/${BIN}" --version
          "bin/${BIN}" -e1 -o /tmp/from-bam.bam test/moo.bam
          test -s /tmp/from-bam.bam
          "bin/${BIN}" -S -e 'chr == "chr1" && pos > 0' -o /tmp/ruby-expr.sam test/moo.bam
          test -s /tmp/ruby-expr.sam
          "bin/${BIN}" -S -e 'tag_AS && tag_AS > 35' -o /tmp/ruby-tag.sam test/moo.bam
          test -s /tmp/ruby-tag.sam
          "bin/${BIN}" -C -f test/moo.fa -e1 -o /tmp/from-bam.cram test/moo.bam
          test -s /tmp/from-bam.cram

      - name: Package
        shell: bash
        run: |
          PKG="${PKG_NAME}-${VERSION}-${TARGET}"
          mkdir -p "${PKG}"
          cp "bin/${BIN}" "${PKG}/"
          cp LICENSE README.md "${PKG}/"
          tar czf "${PKG}.tar.gz" "${PKG}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bam-filter-x86_64-linux-musl
          path: bam-filter-*.tar.gz

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: bam-filter-*.tar.gz

  macos-portable:
    name: build aarch64-apple-darwin portable
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install build dependencies
        run: |
          brew update
          brew install autoconf automake libtool pkg-config libgc pcre2 ruby
          echo "$(brew --prefix ruby)/bin" >> "${GITHUB_PATH}"

      - name: Set version variables
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            echo "CRYSTAL_RELEASE_FLAGS=--no-debug" >> "${GITHUB_ENV}"
            echo "STRIP_RELEASE=true" >> "${GITHUB_ENV}"
          else
            VERSION="build-$(date +%Y%m%d-%H%M%S)"
            echo "CRYSTAL_RELEASE_FLAGS=" >> "${GITHUB_ENV}"
            echo "STRIP_RELEASE=false" >> "${GITHUB_ENV}"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "TARGET=aarch64-apple-darwin" >> "${GITHUB_ENV}"

      - name: Set htslib version
        shell: bash
        run: |
          HTSLIB_VERSION="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/samtools/htslib/releases/latest \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["tag_name"])')"
          echo "HTSLIB_VERSION=${HTSLIB_VERSION}" >> "${GITHUB_ENV}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build static htslib
        shell: bash
        run: |
          curl -fsSL "https://github.com/samtools/htslib/releases/download/${HTSLIB_VERSION}/htslib-${HTSLIB_VERSION}.tar.bz2" -o htslib.tar.bz2
          tar xjf htslib.tar.bz2
          cd "htslib-${HTSLIB_VERSION}"
          autoheader
          autoconf
          ./configure \
            --prefix="${GITHUB_WORKSPACE}/vendor/htslib" \
            --disable-shared \
            --enable-static \
            --disable-bz2 \
            --disable-lzma \
            --disable-libdeflate \
            --disable-libcurl \
            --disable-plugins
          make -j"$(sysctl -n hw.ncpu)"
          make install
          test -f "${GITHUB_WORKSPACE}/vendor/htslib/lib/libhts.a"
          rm -f "${GITHUB_WORKSPACE}/vendor/htslib/lib"/libhts*.dylib

      - name: Install shards
        run: shards install --without-development

      - name: Build portable binary
        shell: bash
        run: |
          mkdir -p bin

          HTSLIB_LIBDIR="${GITHUB_WORKSPACE}/vendor/htslib/lib"
          STATIC_LIBS="-L${HTSLIB_LIBDIR} ${HTSLIB_LIBDIR}/libhts.a"
          STATIC_LIBS="${STATIC_LIBS} -lz"
          STATIC_LIBS="${STATIC_LIBS} $(brew --prefix libgc)/lib/libgc.a"
          STATIC_LIBS="${STATIC_LIBS} $(brew --prefix pcre2)/lib/libpcre2-8.a"

          PKG_CONFIG_PATH="" crystal build src/bam-filter.cr \
            --release \
            ${CRYSTAL_RELEASE_FLAGS} \
            --link-flags="${STATIC_LIBS}" \
            -o "bin/${BIN}"
          chmod +x "bin/${BIN}"
          if [[ "${STRIP_RELEASE}" == true ]]; then
            strip "bin/${BIN}"
          fi

      - name: Verify binary
        shell: bash
        run: |
          file "bin/${BIN}"
          otool -L "bin/${BIN}"
          if otool -L "bin/${BIN}" | grep -E 'libhts(\.[0-9]+)?\.dylib'; then
            echo "Error: htslib dynamic dependency detected"
            exit 1
          fi
          if otool -L "bin/${BIN}" | grep -E '/opt/homebrew|/usr/local/Cellar'; then
            echo "Error: Homebrew dynamic dependency detected"
            exit 1
          fi
          "bin/${BIN}" --version
          "bin/${BIN}" -e1 -o /tmp/from-bam.bam test/moo.bam
          test -s /tmp/from-bam.bam
          "bin/${BIN}" -S -e 'chr == "chr1" && pos > 0' -o /tmp/ruby-expr.sam test/moo.bam
          test -s /tmp/ruby-expr.sam
          "bin/${BIN}" -S -e 'tag_AS && tag_AS > 35' -o /tmp/ruby-tag.sam test/moo.bam
          test -s /tmp/ruby-tag.sam
          "bin/${BIN}" -C -f test/moo.fa -e1 -o /tmp/from-bam.cram test/moo.bam
          test -s /tmp/from-bam.cram

      - name: Package
        shell: bash
        run: |
          PKG="${PKG_NAME}-${VERSION}-${TARGET}"
          mkdir -p "${PKG}"
          cp "bin/${BIN}" "${PKG}/"
          cp LICENSE README.md "${PKG}/"
          tar czf "${PKG}.tar.gz" "${PKG}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bam-filter-aarch64-apple-darwin
          path: bam-filter-*.tar.gz

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: bam-filter-*.tar.gz
